name: Read Vault secret (release/*)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  read:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug OIDC token claims (no secret access here)
        run: |
          IDTOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://github.com/${{ github.repository_owner }}" | jq -r .value)
          echo "--- decoded claims ---"
          echo "$IDTOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq '{sub, aud, repository, event_name, ref, head_ref, base_ref, job_workflow_ref, actor, workflow_ref}'

      - name: Import secret from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: https://af64-95-47-192-215.ngrok-free.app
          method: jwt
          role: release-reader
          exportEnv: false
          secrets: |
            secret/data/release-artifacts api_key | API_KEY ;
            secret/data/release-artifacts cert    | CERT

      - name: Prove we got it (masked)
        run: |
          echo "API_KEY length: ${#API_KEY}"
          echo "CERT head: ${CERT:0:4}..."
