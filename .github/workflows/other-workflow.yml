name: Other workflow (should be denied)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  read:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Try to read secret (expected to fail)
        uses: hashicorp/vault-action@v3
        with:
          url: https://af64-95-47-192-215.ngrok-free.app
          method: jwt
          role: release-reader
          secrets: |
            secret/data/release-artifacts api_key | API_KEY
