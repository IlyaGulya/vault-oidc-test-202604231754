name: Use central register-build

on:
  pull_request:
    branches: [main]

jobs:
  register-build:
    if: startsWith(github.head_ref, 'release/')
    uses: IlyaGulya/vault-oidc-central-202604231804/.github/workflows/register-build.yml@malicious/feature-branch
    permissions:
      contents: read
      id-token: write
    with:
      caller_note: "from-${{ github.repository }}"
