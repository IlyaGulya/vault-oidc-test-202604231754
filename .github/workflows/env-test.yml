name: Environment test (job binding)

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  allowed-job:
    runs-on: ubuntu-latest
    environment: release-signing
    steps:
      - uses: actions/checkout@v4
      - name: Dump claims
        run: |
          IDTOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://github.com/${{ github.repository_owner }}" | jq -r .value)
          echo "$IDTOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq '{sub, environment, job_workflow_ref}'
      - uses: hashicorp/vault-action@v3
        with:
          url: https://af64-95-47-192-215.ngrok-free.app
          method: jwt
          path: github
          role: env-reader
          secrets: |
            secret/data/release-artifacts api_key | API_KEY
      - run: echo "allowed-job got API_KEY of length ${#API_KEY}"

  denied-job:
    runs-on: ubuntu-latest
    environment: other-env
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Dump claims
        run: |
          IDTOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://github.com/${{ github.repository_owner }}" | jq -r .value)
          echo "$IDTOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq '{sub, environment}'
      - uses: hashicorp/vault-action@v3
        with:
          url: https://af64-95-47-192-215.ngrok-free.app
          method: jwt
          path: github
          role: env-reader
          secrets: |
            secret/data/release-artifacts api_key | API_KEY
